services:
  postgres:
    image: postgres:16-alpine
    container_name: echo_postgres
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
      POSTGRES_DB: echo
    ports:
      - '5432:5432'
    volumes:
      - echo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U echo']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: echo_redis
    ports:
      - '6379:6379'
    volumes:
      - echo_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  echo_pgdata:
  echo_redisdata: